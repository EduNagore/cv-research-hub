name: Daily Ingestion

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  trigger-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger full ingestion
        env:
          INGESTION_TRIGGER_URL: ${{ secrets.INGESTION_TRIGGER_URL }}
        run: |
          if [ -z "$INGESTION_TRIGGER_URL" ]; then
            echo "INGESTION_TRIGGER_URL secret is not set."
            exit 1
          fi

          response_file="$(mktemp)"
          status_code=$(curl --show-error --silent \
            --output "$response_file" \
            --write-out "%{http_code}" \
            -X POST \
            "$INGESTION_TRIGGER_URL")

          cat "$response_file"
          echo

          if [ "$status_code" -ge 400 ]; then
            echo "Request failed with HTTP $status_code"
            exit 1
          fi
